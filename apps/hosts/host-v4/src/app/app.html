<tui-root>
  <header tuiNavigationHeader>
    <span tuiNavigationLogo>
      <span> Taiga UI Host v4 </span>
    </span>
    <span tuiNavigationSegments>
        <a appearance="secondary-grayscale" tuiButton routerLink="/" routerLinkActive="_active" [routerLinkActiveOptions]="{exact: true}">Home</a>
        <a appearance="secondary-grayscale" tuiButton routerLink="remoteV4" routerLinkActive="_active"
          >Remote v4</a
        >
        <a appearance="secondary-grayscale" tuiButton routerLink="remoteV5" routerLinkActive="_active"
          >Remote v5</a
        >
        <a appearance="secondary-grayscale" tuiButton routerLink="both" routerLinkActive="_active">Both</a>
    </span>
  </header>
  <main tuiNavigationMain>
    <router-outlet></router-outlet>
  </main>
</tui-root>
